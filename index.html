    <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
  background:#0f0f0f;
  font-family:'Inter', Arial, sans-serif;
  color:white;
  margin:0;
  padding:20px;
}

/* TÍTULO DASHBOARD */
.titulo-dashboard {
  font-size:28px;
  font-weight:700;
  margin-bottom:20px;
  text-align:center;
}

/* CARD */
.card{
  background:#151515;
  width:95%;
  max-width:850px;
    height:210px;
  margin:20px auto;
  padding:25px;
  border-radius:17px;
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
  text-align:left;
}

.card .titulo {
  display:flex;
  align-items:center;
  gap:12px;
  font-size:50px;
  color:#b0b0b0;
  margin-bottom:15px;
}

.card .titulo i{
  font-size:46px;
  color:#b0b0b0;
}

.valor{
  font-size:50px;
  font-weight:700;
  color:white;
}

    .sacar{
  display: inline-block;
  margin-top: 8px;
  color: #16a34a;
  text-decoration: none;
  font-size: 50px; /* aumenta o tamanho da fonte */
}

    
</style>
</head>
<body>

<div class="titulo-dashboard">Dashboard</div>
<div class="card">
  <div class="titulo">
    <i class="fas fa-wallet"></i>
    <span>Saldo disponível</span>
  </div>
  <div class="valor">Mt$ 100,000.00</div>
  <a class="sacar" href="#">Sacar →</a>
</div>

<div class="card">
  <div class="titulo">
      <i class="fas fa-cart-shopping"></i>
    <span>vendas realizadas</span>
  </div>
  <div class="valor">45</div>
</div>

  <div class="card">
  <div class="titulo">
    <i class="fas fa-chart-line"></i>
    <span>Taxa de conversão</span>
  </div>
  <div class="valor">5,5%</div>
</div>

<div class="card">
  <div class="titulo">
    <i class="fas fa-money-bill-wave"></i>
    <span>Ticket médio</span>
  </div>
  <div class="valor">150,00</div>
</div>

</body>
</html>
