    <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
  background:#0f0f0f;
  font-family:'Inter', Arial, sans-serif;
  color:white;
  margin:0;
  padding:20px;
}

/* TÍTULO DASHBOARD */
.titulo-dashboard {
  font-size:28px;
  font-weight:700;
  margin-bottom:20px;
  text-align:center;
}

/* CARD */
.card{
  background:#151515;
  width:95%;
  max-width:850px;
    height:210px;
  margin:20px auto;
  padding:25px;
  border-radius:17px;
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
  text-align:left;
}

.card .titulo {
  display:flex;
  align-items:center;
  gap:12px;
  font-size:50px;
  color:#b0b0b0;
  margin-bottom:15px;
}

.card .titulo i{
  font-size:70px;
  color:#b0b0b0;
}

.valor{
  font-size:50px;
  font-weight:700;
  color:white;
}

    .sacar{
  display: inline-block;
  margin-top: 8px;
  color: #16a34a;
  text-decoration: none;
  font-size: 50px; /* aumenta o tamanho da fonte */
}

    .filtro{
position:relative;
width:95%;
        max-width:850px;
margin:12px auto;
}

.botao{
    height:90px;
    font-size:35px;
background:#151515;
border:1px solid #444;
padding:12px;
border-radius:17px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
color:#b0b0borange
.menu{
display:none;
position:absolute;
top:45px;
background:#151515;
border:1px solid #444;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
width:95%;
    max-width:850px;
padding:10px;
color:#b0b0b09;
    font-size:50px;
}

.opcao{
padding:10px;
cursor:pointer;
border-radius:6px;
}

.opcao:hover{
background:#f2f2f2;
}

.calendario{
margin-top:15px;
border-top:1px solid orange;
padding-top:10px;
}
  

  
.header-cal{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.semana{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
font-size:50px;
color: #b0b0b0;
}

.dias{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
text-align:center;
}

.dia{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.dia:hover{
background:#eee;
}
  
  .botao i{
  margin-left:8px;
  font-size:50px;
  color:#b0orange
}
  
  .header-cal i {
  cursor: pointer;
  font-size: 50px;
  color: orange;
  padding: 5px;
  transition: 0.2s;
}

.header-cal i:hover {
  color: #ffb84d;
}
    
</style>
</head>
<body>

<div class="titulo-dashboard">Dashboard</div>

    <div class="filtro">

<div class="botao" onclick="abrir()">
<span id="texto">Hoje</span>
<i class="fas fa-chevron-down"></i>
</div>

<div class="menu" id="menu">

<div class="opcao" onclick="setFiltro('Hoje')">Hoje</div>
<div class="opcao" onclick="setFiltro('Últimos 7 dias')">Últimos 7 dias</div>
<div class="opcao" onclick="setFiltro('Últimos 30 dias')">Últimos 30 dias</div>
<div class="opcao" onclick="setFiltro('Tempo todo')">Tempo todo</div>

<div class="calendario">

<div class="header-cal">
  <i class="fas fa-chevron-left" onclick="mesAnterior()"></i>
  <span id="mes"></span>
  <i class="fas fa-chevron-right" onclick="mesSeguinte()"></i>
</div>

<div class="semana">
<div>Seg</div>
<div>Ter</div>
<div>Qua</div>
<div>Qui</div>
<div>Sex</div>
<div>Sáb</div>
<div>Dom</div>
</div>

<div class="dias" id="dias"></div>

</div>
</div>
</div>

    
    <div class="card">
  <div class="titulo">
    <i class="fas fa-wallet"></i>
    <span>Saldo disponível</span>
  </div>
  <div class="valor">Mt$ 100,000.00</div>
  <a class="sacar" href="#">Sacar →</a>
</div>

<div class="card">
  <div class="titulo">
      <i class="fas fa-cart-shopping"></i>
    <span>vendas realizadas</span>
  </div>
  <div class="valor">45</div>
</div>

  <div class="card">
  <div class="titulo">
    <i class="fas fa-chart-line"></i>
    <span>Taxa de conversão</span>
  </div>
  <div class="valor">5,5%</div>
</div>

<div class="card">
  <div class="titulo">
    <i class="fas fa-money-bill-wave"></i>
    <span>Ticket médio</span>
  </div>
  <div class="valor">150,00</div>
</div>

    
<script>
Chart.register(ChartDataLabels);

// Vendas por hora (linha)
const ctxHora = document.getElementById("graficoHora").getContext('2d');
new Chart(ctxHora, {
  type:'line',
  data:{
    labels:Array.from({length:24},(_,i)=>i+"h"),
    datasets:[{
      data:[15,0,0,0,0,8,0,0,0,0,13,1,0,2,5,0,0,0,0,0,0,0,18,1],
      borderColor:'#ff6a00',
      borderWidth:3,
      pointRadius:0,
      fill:false,
      tension:0.4
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    interaction:{mode:'index', intersect:false},
    plugins:{legend:{display:false}}
  }
});

// Vendas por pagamento (pizza)
const ctxPag = document.getElementById("graficoPagamento").getContext('2d');
new Chart(ctxPag, {
  type:'pie',
  data:{
    labels:['M-Pesa','E-Mola'],
    datasets:[{
      data:[15,10],
      backgroundColor:['#e60023','#ff8c00'],
      borderWidth:0
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{position:'bottom', labels:{color:'white', font:{size:14}}},
      datalabels:{
        color:'white',
        font:{weight:'bold', size:14},
        formatter:(value,context)=>{
          const total = context.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
          return ((value/total)*100).toFixed(0)+'%';
        }
      }
    }
  },
  plugins:[ChartDataLabels]
});
  
  
  
/* MENU */

function openMenu(){
document.getElementById("sidebar").classList.add("open")
document.getElementById("menuBtn").style.display="none"
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("open")
document.getElementById("menuBtn").style.display="block"
}

/* FILTRO */

let data = new Date()

function abrir(){
let menu=document.getElementById("menu")
menu.style.display=menu.style.display=="block"?"none":"block"
}

function setFiltro(t){
document.getElementById("texto").innerText=t
document.getElementById("menu").style.display="none"
}

function renderCalendario(){

let ano=data.getFullYear()
let mes=data.getMonth()

let primeiroDia=new Date(ano,mes,1).getDay()
if(primeiroDia==0){primeiroDia=7}
primeiroDia--

let diasMes=new Date(ano,mes+1,0).getDate()

let nomesMes=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"]

document.getElementById("mes").innerText=nomesMes[mes]+" "+ano

let diasHTML=""

for(let i=0;i<primeiroDia;i++){diasHTML+="<div></div>"}

for(let d=1;d<=diasMes;d++){
diasHTML+=`<div class="dia" onclick="selecionarDia(${d})">${d}</div>`
}

document.getElementById("dias").innerHTML=diasHTML
}

function selecionarDia(d){
  const dia = d.toString().padStart(2, '0'); // garante 2 dígitos
  const mes = (data.getMonth() + 1).toString().padStart(2, '0'); // mês 1-12
  const ano = data.getFullYear();
  
  document.getElementById("texto").innerText = `${dia}/${mes}/${ano}`;
  document.getElementById("menu").style.display = "none";
}

function mesAnterior(){
data.setMonth(data.getMonth()-1)
renderCalendario()
}

function mesSeguinte(){
data.setMonth(data.getMonth()+1)
renderCalendario()
}

renderCalendario()

/* GRAFICOS */

Chart.register(ChartDataLabels)

new Chart(document.getElementById("graficoHora"),{
type:'line',
data:{
labels:Array.from({length:24},(_,i)=>i+"h"),
datasets:[{
data:[15,0,0,0,0,8,0,0,0,0,13,1,0,2,5,0,0,0,0,0,0,0,18,1],
borderColor:'#ff6a00',
borderWidth:3,
pointRadius:0,
fill:false,
tension:0.4
}]
},
options:{plugins:{legend:{display:false}}}
})

new Chart(document.getElementById("graficoPagamento"),{
type:'pie',
data:{
labels:['M-Pesa','E-Mola'],
datasets:[{
data:[15,10],
backgroundColor:['#e60023','#ff8c00']
}]
}
})

</script>

</body>
</html>
