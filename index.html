    <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
  background:#0f0f0f;
  font-family:'Inter', Arial, sans-serif;
  color:white;
  margin:0;
  padding:20px;
}

/* TÍTULO DASHBOARD */
.titulo-dashboard {
  font-size:28px;
  font-weight:700;
  margin-bottom:20px;
  text-align:center;
}

/* CARD */
.card{
  background:#151515;
  width:95%;
  max-width:850px;
    height:210px;
  margin:20px auto;
  padding:25px;
  border-radius:17px;
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
  text-align:left;
}

.card .titulo {
  display:flex;
  align-items:center;
  gap:12px;
  font-size:50px;
  color:#b0b0b0;
  margin-bottom:15px;
}

.card .titulo i{
  font-size:70px;
  color:#b0b0b0;
}

.valor{
  font-size:50px;
  font-weight:700;
  color:white;
}

    .sacar{
  display: inline-block;
  margin-top: 8px;
  color: #16a34a;
  text-decoration: none;
  font-size: 50px; /* aumenta o tamanho da fonte */
}

    .filtro{
position:relative;
width:95%;
        max-width:850px;
margin:12px auto;
}

.botao{
    height:90px;
background:#151515;
border:1px solid #444;
padding:12px;
border-radius:17px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.menu{
display:none;
position:absolute;
top:45px;
background:#151515;
border:1px solid #444;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
width:95%;
    max-width:850px;
padding:10px;
color:#b0b0b09;
    font-size:50px;
}

.opcao{
padding:10px;
cursor:pointer;
border-radius:6px;
}

.opcao:hover{
background:#f2f2f2;
}

.calendario{
margin-top:15px;
border-top:1px solid orange;
padding-top:10px;
}
  

  
.header-cal{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.semana{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
font-size:50px;
color: #b0b0b0;
}

.dias{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
text-align:center;
}

.dia{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.dia:hover{
background:#eee;
}
  
  .botao i{
  margin-left:8px;
  font-size:50px;
  color:orange;
}
  
  .header-cal i {
  cursor: pointer;
  font-size: 50px;
  color: orange;
  padding: 5px;
  transition: 0.2s;
}

.header-cal i:hover {
  color: #ffb84d;
}
    
</style>
</head>
<body>

<div class="titulo-dashboard">Dashboard</div>

    <div class="filtro">

<div class="botao" onclick="abrir()">
<span id="texto">Hoje</span>
<i class="fas fa-chevron-down"></i>
</div>

<div class="menu" id="menu">

<div class="opcao" onclick="setFiltro('Hoje')">Hoje</div>
<div class="opcao" onclick="setFiltro('Últimos 7 dias')">Últimos 7 dias</div>
<div class="opcao" onclick="setFiltro('Últimos 30 dias')">Últimos 30 dias</div>
<div class="opcao" onclick="setFiltro('Tempo todo')">Tempo todo</div>

<div class="calendario">

<div class="header-cal">
  <i class="fas fa-chevron-left" onclick="mesAnterior()"></i>
  <span id="mes"></span>
  <i class="fas fa-chevron-right" onclick="mesSeguinte()"></i>
</div>

<div class="semana">
<div>Seg</div>
<div>Ter</div>
<div>Qua</div>
<div>Qui</div>
<div>Sex</div>
<div>Sáb</div>
<div>Dom</div>
</div>

<div class="dias" id="dias"></div>

</div>
</div>
</div>

    
    <div class="card">
  <div class="titulo">
    <i class="fas fa-wallet"></i>
    <span>Saldo disponível</span>
  </div>
  <div class="valor">Mt$ 100,000.00</div>
  <a class="sacar" href="#">Sacar →</a>
</div>

<div class="card">
  <div class="titulo">
      <i class="fas fa-cart-shopping"></i>
    <span>vendas realizadas</span>
  </div>
  <div class="valor">45</div>
</div>

  <div class="card">
  <div class="titulo">
    <i class="fas fa-chart-line"></i>
    <span>Taxa de conversão</span>
  </div>
  <div class="valor">5,5%</div>
</div>

<div class="card">
  <div class="titulo">
    <i class="fas fa-money-bill-wave"></i>
    <span>Ticket médio</span>
  </div>
  <div class="valor">150,00</div>
</div>

</body>
</html>
